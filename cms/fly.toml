app = "care-collaborator-cms"
primary_region = "sin"

[build]

[env]
  PORT = "1337"
  NODE_ENV = "production"

[http_service]
  internal_port = 1337
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
